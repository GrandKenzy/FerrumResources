{% extends "base.html" %}
{% block page_title %}Cola de Tareas{% endblock %}

{% block content %}
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
    <div>
        <div style="color:var(--text2);font-size:0.85rem;">Monitorea todas las tareas en segundo plano</div>
    </div>
    <div style="display:flex;gap:0.75rem;">
        <button class="btn" onclick="clearDone()"><i class="fas fa-trash-can"></i> Limpiar Completadas</button>
        <button class="btn btn-primary" onclick="loadJobs()"><i class="fas fa-rotate-right"></i> Actualizar</button>
    </div>
</div>

<div class="grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:1.5rem;">
    <div class="card stat-card info">
        <div class="card-title">Total</div>
        <div class="card-value" id="stat-total">0</div>
    </div>
    <div class="card stat-card">
        <div class="card-title">En Curso</div>
        <div class="card-value text-accent" id="stat-running">0</div>
    </div>
    <div class="card stat-card success">
        <div class="card-title">Completadas</div>
        <div class="card-value text-success" id="stat-done">0</div>
    </div>
    <div class="card stat-card danger">
        <div class="card-title">Errores</div>
        <div class="card-value text-danger" id="stat-errors">0</div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <div class="card-title"><i class="fas fa-list-check"></i> Tareas</div>
        <div style="display:flex;gap:0.5rem;">
            <button class="btn btn-sm" onclick="filterJobs('all')" id="f-all">Todas</button>
            <button class="btn btn-sm" onclick="filterJobs('running')" id="f-running">En Curso</button>
            <button class="btn btn-sm" onclick="filterJobs('done')" id="f-done">Listas</button>
            <button class="btn btn-sm" onclick="filterJobs('error')" id="f-error">Error</button>
        </div>
    </div>
    <div id="jobs-list" style="display:flex;flex-direction:column;gap:0.75rem;"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
let _allJobs = [];
let _filter = 'all';

const STATUS_ICON = { queued:'fa-clock', running:'fa-spinner fa-spin', done:'fa-check-circle', error:'fa-exclamation-circle', cancelled:'fa-ban' };
const STATUS_COLOR = { queued:'badge-neutral', running:'badge-accent', done:'badge-success', error:'badge-danger', cancelled:'badge-neutral' };

async function loadJobs() {
    try {
        _allJobs = await apiCall('/api/jobs');
        renderJobs();
        updateStats();
    } catch(e) {}
}

function updateStats() {
    document.getElementById('stat-total').textContent = _allJobs.length;
    document.getElementById('stat-running').textContent = _allJobs.filter(j=>j.status==='running').length;
    document.getElementById('stat-done').textContent = _allJobs.filter(j=>j.status==='done').length;
    document.getElementById('stat-errors').textContent = _allJobs.filter(j=>j.status==='error').length;
}

function filterJobs(f) {
    _filter = f;
    renderJobs();
}

function renderJobs() {
    const list = document.getElementById('jobs-list');
    const jobs = _filter === 'all' ? _allJobs : _allJobs.filter(j => j.status === _filter);

    if (!jobs.length) {
        list.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--text2);"><i class="fas fa-inbox" style="font-size:2.5rem;opacity:0.3;"></i><div style="margin-top:1rem;">Sin tareas</div></div>';
        return;
    }

    list.innerHTML = jobs.map(j => `
        <div class="job-item ${j.status}">
            <div class="job-head">
                <div style="display:flex;align-items:center;gap:0.75rem;">
                    <i class="fas ${STATUS_ICON[j.status]||'fa-circle'}" style="color:var(--accent);width:16px;text-align:center;"></i>
                    <div>
                        <div style="font-weight:700;font-size:0.88rem;">${j.kind}</div>
                        <div style="font-size:0.75rem;color:var(--text2);font-family:monospace;">#${j.id}</div>
                    </div>
                </div>
                <div style="display:flex;align-items:center;gap:0.75rem;">
                    <span class="badge ${STATUS_COLOR[j.status]}">${j.status}</span>
                    ${j.status==='running'?`<button class="btn btn-sm btn-danger" onclick="cancelJob('${j.id}')"><i class="fas fa-stop"></i></button>`:''}
                </div>
            </div>
            <div style="font-size:0.82rem;color:var(--text2);">${j.message||''}</div>
            ${j.status==='running'?`<div class="progress-bar mt-1"><div class="progress-fill" style="width:${j.progress||0}%"></div></div>`:''}
            ${j.error?`<div style="font-size:0.8rem;color:var(--danger);margin-top:4px;"><i class="fas fa-exclamation-triangle"></i> ${j.error}</div>`:''}
            <div style="font-size:0.72rem;color:var(--text2);margin-top:4px;">${new Date(j.created_at).toLocaleString()}</div>
        </div>
    `).join('');
}

async function cancelJob(id) {
    await apiCall(`/api/jobs/${id}/cancel`, 'POST');
    loadJobs();
}

function clearDone() {
    _allJobs = _allJobs.filter(j => j.status !== 'done' && j.status !== 'cancelled');
    renderJobs();
    updateStats();
}

loadJobs();
setInterval(loadJobs, 3000);
</script>
{% endblock %}
