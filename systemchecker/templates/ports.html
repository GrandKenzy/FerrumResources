{% extends "base.html" %}
{% block page_title %}Gestor de Puertos{% endblock %}
{% block active_page %}ports{% endblock %}

{% block content %}
<div class="card" style="margin-bottom: 2rem;">
    <div class="card-title">Port Protect (Lanzador Seguro)</div>
    <div class="grid" style="grid-template-columns: 1fr 2fr 1fr; align-items: flex-end;">
        <div class="form-group" style="margin-bottom: 0;">
            <label>Puerto Pref.</label>
            <input type="number" id="pp-port" value="3000">
        </div>
        <div class="form-group" style="margin-bottom: 0;">
            <label>Comando (Usa {PORT})</label>
            <input type="text" id="pp-cmd" placeholder="npx vite --port {PORT}">
        </div>
        <button class="btn btn-primary" onclick="launchProtected()" style="height: 42px;"><i class="fas fa-rocket"></i> Lanzar</button>
    </div>
</div>

<div class="table-container">
    <table id="ports-table">
        <thead>
            <tr>
                <th>Puerto</th>
                <th>Tipo</th>
                <th>Nombre Servicio</th>
                <th>Proceso Dueño</th>
                <th>PID</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="ports-body">
            <tr><td colspan="6" style="text-align: center; padding: 3rem;">Cargando puertos...</td></tr>
        </tbody>
    </table>
</div>

{% endblock %}

{% block scripts %}
<script>
async function refreshPorts() {
    const data = await apiCall('/api/ports');
    const tbody = document.getElementById('ports-body');
    tbody.innerHTML = '';
    
    data.forEach(p => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td style="font-weight: 700;">${p.port}</td>
            <td>${p.type}</td>
            <td><span class="badge" style="background: #f0f0f0;">${p.label || 'N/A'}</span></td>
            <td>${p.process_name}</td>
            <td>${p.pid || 'N/A'}</td>
            <td>
                <div style="display: flex; gap: 5px;">
                    ${p.is_http ? `<a href="http://127.0.0.1:${p.port}" target="_blank" class="btn btn-sm"><i class="fas fa-external-link-alt"></i></a>` : ''}
                    <button class="btn btn-sm btn-danger" onclick="killProc(${p.pid}, '${p.process_name}')"><i class="fas fa-times"></i></button>
                </div>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

function launchProtected() {
    const port = document.getElementById('pp-port').value;
    const cmd = document.getElementById('pp-cmd').value;
    if (!cmd) return alert('Ingresa un comando');
    
    alert('Función Port Protect en desarrollo (Backend listo, UI vinculando)');
}

function killProc(pid, name) {
    if (!pid) return alert('No se puede terminar un proceso sin PID');
    showModal(
        'Terminar Proceso Dueño',
        `¿Deseas terminar el proceso ${name} (${pid}) para liberar el puerto?`,
        true,
        (confirm) => {
            apiCall(`/api/processes/${pid}/kill`, 'POST', { confirm }).then(() => {
                alert('Proceso terminado');
                refreshPorts();
            });
        }
    );
}

refreshPorts();
setInterval(refreshPorts, 5000);
</script>
{% endblock %}
