{% extends "base.html" %}
{% block page_title %}Terminal Integrada{% endblock %}

{% block content %}
<div class="card mb-2">
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem;">
        <div style="display:flex; gap:0.5rem; align-items:center;">
            <label style="font-size:0.8rem; color:var(--text2);">Shell:</label>
            <select id="shell-select" class="form-control" style="width:120px; padding:0.3rem;" onchange="startSession()">
                <option value="powershell">PowerShell</option>
                <option value="cmd">CMD</option>
            </select>
            <button class="btn btn-sm btn-danger" onclick="startSession()"><i class="fas fa-rotate-right"></i> Reiniciar</button>
        </div>
        
        <div style="display:flex; gap:0.5rem; align-items:center;">
            <label style="font-size:0.8rem; color:var(--text2);">Tema:</label>
            <select id="theme-select" class="form-control" style="width:120px; padding:0.3rem;" onchange="applyTheme()">
                <option value="github-dark">GitHub Dark</option>
                <option value="github-light">GitHub Light</option>
                <option value="ubuntu">Ubuntu</option>
                <option value="matrix">Matrix</option>
            </select>
            
            <label style="font-size:0.8rem; color:var(--text2); margin-left:1rem;">Fuente:</label>
            <input type="number" id="font-size" value="14" min="10" max="24" style="width:50px; padding:0.3rem;" onchange="applyTheme()">
        </div>
    </div>
</div>

<div class="card" style="padding:0; overflow:hidden;">
    <div id="terminal-container" style="height:600px; width:100%; display:flex; flex-direction:column; background-color:#0d1117; color:#c9d1d9; font-family:'Cascadia Code', Consolas, monospace; font-size:14px; position:relative;">
        <div id="terminal-output" style="flex-grow:1; overflow-y:auto; padding:1rem; white-space:pre-wrap; word-wrap:break-word;">Iniciando terminal...</div>
        <div style="display:flex; padding:0 1rem 1rem 1rem;">
            <span id="terminal-prompt" style="margin-right:0.5rem; color:#58a6ff;">></span>
            <input type="text" id="terminal-input" autocomplete="off" spellcheck="false" style="flex-grow:1; background:transparent; border:none; color:inherit; font-family:inherit; font-size:inherit; outline:none;">
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let sessionId = null;
let pollInterval = null;
const termOutput = document.getElementById('terminal-output');
const termInput = document.getElementById('terminal-input');
const termContainer = document.getElementById('terminal-container');
const promptEl = document.getElementById('terminal-prompt');

const themes = {
    'github-dark': { bg: '#0d1117', fg: '#c9d1d9', prompt: '#58a6ff' },
    'github-light': { bg: '#ffffff', fg: '#24292f', prompt: '#0969da' },
    'ubuntu': { bg: '#300a24', fg: '#eeeeee', prompt: '#8ae234' },
    'matrix': { bg: '#000000', fg: '#00ff00', prompt: '#00ff00' }
};

function applyTheme() {
    const theme = document.getElementById('theme-select').value;
    const fontSize = document.getElementById('font-size').value;
    const colors = themes[theme];
    
    termContainer.style.backgroundColor = colors.bg;
    termContainer.style.color = colors.fg;
    promptEl.style.color = colors.prompt;
    termContainer.style.fontSize = fontSize + 'px';
}

async function startSession() {
    if(pollInterval) clearInterval(pollInterval);
    termOutput.innerHTML = 'Iniciando sesión...';
    
    const shell = document.getElementById('shell-select').value;
    promptEl.innerText = shell === 'powershell' ? 'PS >' : 'C:\\>';
    
    try {
        const res = await apiCall('/api/terminal/start', 'POST', {shell: shell});
        sessionId = res.session_id;
        termOutput.innerHTML = '';
        pollInterval = setInterval(pollTerminal, 500);
        termInput.focus();
    } catch(e) {
        termOutput.innerHTML = 'Error al iniciar terminal: ' + e;
    }
}

async function pollTerminal() {
    if(!sessionId) return;
    try {
        // Use a standard fetch instead of apiCall to avoid showing Toast errors on timeout/disconnect during normal polling
        const csrf = document.querySelector('meta[name="csrf-token"]')?.content || '';
        const response = await fetch('/api/terminal/read', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRF-Token': csrf},
            body: JSON.stringify({session_id: sessionId})
        });
        if(response.ok) {
            const data = await response.json();
            if(data.output) {
                // simple escape html
                const escaped = data.output.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                termOutput.innerHTML += escaped;
                termOutput.scrollTop = termOutput.scrollHeight;
            }
        }
    } catch(e) {}
}

termInput.addEventListener('keydown', async function(e) {
    if(e.key === 'Enter') {
        const cmd = this.value;
        this.value = '';
        termOutput.innerHTML += `\n<span style="color:${promptEl.style.color}">${promptEl.innerText}</span> ${cmd}\n`;
        termOutput.scrollTop = termOutput.scrollHeight;
        
        if(!sessionId) return;
        try {
            await apiCall('/api/terminal/write', 'POST', {session_id: sessionId, command: cmd});
        } catch(e) {}
    }
});

// Click anywhere on terminal focuses input
termContainer.addEventListener('click', () => termInput.focus());

applyTheme();
startSession();
</script>
{% endblock %}
