{% extends "base.html" %}
{% block page_title %}Explorador de Archivos y Archivos Comprimidos{% endblock %}

{% block content %}
<div class="card mb-2">
    <div style="display:flex; gap:0.5rem; align-items:center;">
        <button class="btn btn-sm" onclick="navUp()"><i class="fas fa-arrow-up"></i> Subir</button>
        <input type="text" id="current-path" class="form-control" style="flex-grow:1;" value="C:\">
        <button class="btn btn-primary btn-sm" onclick="loadPath()"><i class="fas fa-arrow-right"></i> Ir</button>
    </div>
</div>

<div class="grid grid-2" style="grid-template-columns: 2fr 1fr; align-items:flex-start;">
    <div class="card" style="padding:0; overflow:hidden;">
        <div class="table-container" style="max-height:600px; overflow-y:auto;">
            <table>
                <thead>
                    <tr>
                        <th style="width:30px;"></th>
                        <th>Nombre</th>
                        <th>Tamaño</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="explorer-body">
                    <tr><td colspan="4" style="text-align:center; padding:2rem;"><i class="fas fa-spinner fa-spin"></i> Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <div class="card" id="selection-panel" style="opacity:0.5; pointer-events:none;">
        <div class="card-title">Archivo Seleccionado</div>
        <div id="sel-name" class="mono truncate mb-1" style="font-weight:bold; font-size:0.9rem;">Ninguno</div>
        <input type="hidden" id="sel-path">
        <input type="hidden" id="sel-isdir">
        
        <div class="form-group mt-2">
            <label>Mover a:</label>
            <div style="display:flex; gap:0.5rem;">
                <input type="text" id="move-dest" placeholder="C:\Destino">
                <button class="btn btn-primary" onclick="moveFile()"><i class="fas fa-truck-moving"></i></button>
            </div>
        </div>
        
        <div id="archive-actions" style="display:none; border-top:1px solid var(--border); margin-top:1rem; padding-top:1rem;">
            <div style="font-size:0.8rem; color:var(--text2); margin-bottom:0.5rem;"><i class="fas fa-file-zipper"></i> Opciones de Extracción</div>
            <button class="btn w-full mb-1" onclick="extractHere()"><i class="fas fa-box-open"></i> Extraer aquí</button>
            <button class="btn w-full mb-1" onclick="openWith('7z')"><i class="fas fa-external-link-alt"></i> Abrir con 7-Zip</button>
            <button class="btn w-full" onclick="openWith('winrar')"><i class="fas fa-external-link-alt"></i> Abrir con WinRAR</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadPath(path) {
    if(!path) path = document.getElementById('current-path').value;
    const tbody = document.getElementById('explorer-body');
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:2rem;"><i class="fas fa-spinner fa-spin"></i> Cargando...</td></tr>';
    
    try {
        const data = await apiCall('/api/explorer/list', 'POST', {path: path});
        if(data.error) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:var(--danger); padding:2rem;">${data.error}</td></tr>`;
            return;
        }
        
        document.getElementById('current-path').value = data.path;
        
        if(data.items.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:2rem; color:var(--text2);">Carpeta vacía</td></tr>';
            return;
        }
        
        tbody.innerHTML = data.items.map(item => {
            const icon = item.is_dir ? 'fa-folder text-accent' : 
                         (item.name.match(/\.(zip|rar|7z|tar|gz)$/i) ? 'fa-file-zipper text-warning' : 'fa-file text-muted');
            const size = item.is_dir ? '' : (item.size / 1024 / 1024).toFixed(2) + ' MB';
            const escapedPath = item.path.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
            const escapedName = item.name.replace(/'/g, "\\'");
            
            return `
                <tr style="cursor:pointer;" onclick="selectItem('${escapedPath}', '${escapedName}', ${item.is_dir})" ondblclick="if(${item.is_dir}) loadPath('${escapedPath}')">
                    <td style="text-align:center;"><i class="fas ${icon}"></i></td>
                    <td><div class="truncate" style="max-width:300px;">${item.name}</div></td>
                    <td style="font-size:0.8rem; color:var(--text2);">${size}</td>
                    <td>
                        <button class="btn btn-sm" onclick="event.stopPropagation(); apiCall('/api/explorer/openwith', 'POST', {path: '${escapedPath}', app: 'explorer'})" title="Abrir en Windows"><i class="fas fa-folder-open"></i></button>
                    </td>
                </tr>
            `;
        }).join('');
    } catch(e) {
        tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:var(--danger); padding:2rem;">Error de red</td></tr>`;
    }
}

function selectItem(path, name, isDir) {
    document.getElementById('selection-panel').style.opacity = '1';
    document.getElementById('selection-panel').style.pointerEvents = 'auto';
    document.getElementById('sel-name').innerText = name;
    document.getElementById('sel-path').value = path;
    document.getElementById('sel-isdir').value = isDir;
    
    const isArchive = name.match(/\.(zip|rar|7z|tar|gz)$/i);
    document.getElementById('archive-actions').style.display = (!isDir && isArchive) ? 'block' : 'none';
}

function navUp() {
    const p = document.getElementById('current-path').value;
    const parts = p.split('\\').filter(Boolean);
    if(parts.length > 1) {
        parts.pop();
        loadPath(parts.join('\\') + (parts.length === 1 ? '\\' : ''));
    }
}

async function moveFile() {
    const src = document.getElementById('sel-path').value;
    const dst = document.getElementById('move-dest').value;
    if(!src || !dst) return;
    
    const r = await apiCall('/api/explorer/move', 'POST', {src: src, dst: dst});
    if(r.ok) {
        showToast('Movido correctamente', 'success');
        loadPath();
    } else {
        showToast(r.error, 'error');
    }
}

async function extractHere() {
    const src = document.getElementById('sel-path').value;
    showToast('Extrayendo...', 'info');
    const r = await apiCall('/api/explorer/extract', 'POST', {path: src});
    if(r.ok) {
        showToast('Extraído en: ' + r.dest, 'success');
        loadPath();
    } else {
        showToast(r.error, 'error');
    }
}

async function openWith(app) {
    const src = document.getElementById('sel-path').value;
    const r = await apiCall('/api/explorer/openwith', 'POST', {path: src, app: app});
    if(r.ok) showToast('Abriendo con ' + app, 'info');
    else showToast(r.error, 'error');
}

document.getElementById('current-path').addEventListener('keydown', e => { if(e.key === 'Enter') loadPath(); });
loadPath('C:\\');
</script>
{% endblock %}
